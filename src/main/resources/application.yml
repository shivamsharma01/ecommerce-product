spring:
  application:
    name: product
  cloud:
    gcp:
      project-id: ${SPRING_CLOUD_GCP_PROJECT_ID:}
      credentials:
        location: ${SPRING_CLOUD_GCP_CREDENTIALS_LOCATION:}
      firestore:
        enabled: ${SPRING_CLOUD_GCP_FIRESTORE_ENABLED:false}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8081}

server:
  port: ${SERVER_PORT:8084}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  catalog:
    bucket-name: ${CATALOG_IMAGES_BUCKET:}
    image-prefix: ${CATALOG_IMAGE_PREFIX:products}
  security:
    enabled: ${APP_SECURITY_ENABLED:false}
    required-scope: ${APP_SECURITY_REQUIRED_SCOPE:product.admin}
